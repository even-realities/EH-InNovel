name: Build Plugin

on:
  push:
    branches: [ master, main, 'claude/**' ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-js:
    name: Build Kotlin/JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JS bundle
        run: ./gradlew :composeApp:jsBrowserDistribution

      - name: Upload JS artifact
        uses: actions/upload-artifact@v4
        with:
          name: pomodoro-timer-js
          path: composeApp/build/dist/js/productionExecutable/

  build-wasm:
    name: Build Kotlin/Wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Wasm bundle
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Upload Wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: pomodoro-timer-wasm
          path: composeApp/build/dist/wasmJs/productionExecutable/
